<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Transactions - MarineLink Portal</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/tables.css">
</head>

<body>

<div class="sidebar">
    <h2>MarineLink Portal</h2>

    <ul>
        <li onclick="goDashboard()">Dashboard</li>
        <li onclick="navigate('admin_listings')">Listings</li>
        <li onclick="navigate('admin_transactions')">Transactions</li>
        <li onclick="navigate('admin_users')">Users</li>
        <li onclick="logout()">Logout</li>
    </ul>
</div>

<div class="main">
    <h1>All Transactions</h1>

    <table id="adminTransactionsTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Listing</th>
                <th>Fisher</th>
                <th>Buyer</th>
                <th>Total Price (TZS)</th>
                <th>Status</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <p id="error"></p>
</div>

<script src="js/api.js"></script>
<script src="js/admin-transactions.js"></script>
</body>
</html>
