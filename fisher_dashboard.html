<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Fisher Dashboard - MarineLink Portal</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

    <div class="sidebar">
        <h2>MarineLink Portal</h2>

        <ul>
            <li onclick="goDashboard()">Dashboard</li>
            <li onclick="navigate('fisher_listings')">Listings</li>
            <li onclick="navigate('create-listing')" id="fisherOnly">Create Listing</li>
            <li onclick="navigate('my-listings')" id="fisherOnly">My Listings</li>
            <li onclick="navigate('fisher_transactions')">Transactions</li>
            <li onclick="logout()">Logout</li>
        </ul>
    </div>

    <div class="main">
        <h1>Welcome, <span id="fisherName"></span></h1>

        <div class="stats-container">
            <div class="stat-card">
                <h3>Total Listings</h3>
                <p id="totalListings">0</p>
            </div>

            <div class="stat-card">
                <h3>Total Transactions</h3>
                <p id="totalTransactions">0</p>
            </div>

            <div class="stat-card">
                <h3>Total Revenue</h3>
                <p id="totalRevenue">0</p>
            </div>

            <div class="stat-card">
                <h3>Pending Orders</h3>
                <p id="pendingOrders">0</p>
            </div>

            <div class="stat-card">
                <h3>Completed Orders</h3>
                <p id="completedOrders">0</p>
            </div>
        </div>

        <h2>Recent Listings</h2>

        <table id="myListingsTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Species</th>
                    <th>Location</th>
                    <th>Weight (kg)</th>
                    <th>Price/kg</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script src="js/api.js"></script>
    <script src="js/fisher-dashboard.js"></script>
</body>

</html>
