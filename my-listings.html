<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Listings - MarineLink Portal</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/tables.css">
    <link rel="stylesheet" href="css/forms.css">
</head>

<body>

<div class="sidebar">
    <h2>MarineLink Portal</h2>

    <ul>
        <li onclick="goDashboard()">Dashboard</li>
        <li onclick="navigate('fisher_listings')">Listings</li>
        <li onclick="navigate('create-listing')" id="fisherOnly">Create Listing</li>
        <li onclick="navigate('my-listings')" id="fisherOnly">My Listings</li>
        <li onclick="navigate('fisher_transactions')">Transactions</li>
        <li onclick="logout()">Logout</li>
    </ul>
</div>

<div class="main">
    <h1>My Listings</h1>

    <table id="myListingsTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Species</th>
                <th>Location</th>
                <th>Weight (kg)</th>
                <th>Price/kg</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<!-- Edit Modal -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>Edit Listing</h3>

        <label>Species</label>
        <input id="editSpecies">

        <label>Location</label>
        <input id="editLocation">

        <label>Weight (kg)</label>
        <input id="editWeight">

        <label>Price per Kg</label>
        <input id="editPrice">

        <button onclick="saveListingEdit()" class="submit-btn">Save</button>
        <button class="cancel-btn" onclick="closeEditModal()">Cancel</button>

        <p id="editMessage"></p>
    </div>
</div>

<!-- Delete Modal -->
<div id="deleteModal" class="modal">
    <div class="modal-content">
        <h3>Delete Listing</h3>

        <p id="deleteListingText"></p>

        <button onclick="confirmDelete()" class="delete-confirm-btn">Yes, Delete</button>
        <button class="cancel-btn" onclick="closeDeleteModal()">Cancel</button>

        <p id="deleteMessage"></p>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/fisher-my-listings.js"></script>
</body>
</html>
