<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Buyer Listings - MarineLink Portal</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/tables.css">
</head>

<body>

<div class="sidebar">
    <h2>MarineLink Portal</h2>

    <ul>
        <li onclick="goDashboard()">Dashboard</li>
        <li onclick="navigate('buyer_listings')">Listings</li>
        <li onclick="navigate('buyer_orders')">My Orders</li>
        <li onclick="logout()">Logout</li>
    </ul>
</div>

<div class="main">
    <h1>Available Listings</h1>

    <table id="buyerListingsTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Species</th>
                <th>Location</th>
                <th>Weight (kg)</th>
                <th>Price/kg</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <p id="message"></p>
</div>

<script src="js/api.js"></script>
<script src="js/buyer-listings.js"></script>
</body>
</html>
