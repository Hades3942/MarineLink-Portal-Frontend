<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin - User Management</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/users.css">
</head>

<body>

<div class="sidebar">
    <h2>MarineLink Portal</h2>

    <ul>
        <li onclick="goDashboard()">Dashboard</li>
        <li onclick="navigate('admin_listings')">Listings</li>
        <li onclick="navigate('admin_transactions')">Transactions</li>
        <li onclick="navigate('admin_users')" id="adminOnly">Users</li>
        <li onclick="logout()">Logout</li>
    </ul>
</div>

<div class="main">

    <h2>Registered Users</h2>

    <div class="search-filter-container">
        <input type="text" id="searchInput" placeholder="Search by name, email, username, or Zanzibar ID">

        <select id="roleFilter">
            <option value="">All Roles</option>
            <option value="ADMIN">ADMIN</option>
            <option value="FISHER">FISHER</option>
            <option value="BUYER">BUYER</option>
            <option value="REGULATOR">REGULATOR</option>
        </select>
    </div>

    <table class="users-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Zanzibar ID</th>
                <th>Full Name</th>
                <th>Email</th>
                <th>Username</th>
                <th>Role</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="usersTableBody"></tbody>
    </table>

    <!-- EDIT USER MODAL -->
    <div id="editModal" class="modal">
        <div class="modal-box">
            <h3>Edit User</h3>

            <div class="form-group">
                <label>Zanzibar ID</label>
                <input type="text" id="editZanzibarId">
            </div>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="editFullName">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="editEmail">
            </div>

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="editUsername">
            </div>

            <div class="form-group">
                <label>Role</label>
                <select id="editRole">
                    <option value="ADMIN">ADMIN</option>
                    <option value="FISHER">FISHER</option>
                    <option value="BUYER">BUYER</option>
                    <option value="REGULATOR">REGULATOR</option>
                </select>
            </div>

            <p id="editMessage"></p>

            <div class="modal-actions">
                <button class="btn save-btn" onclick="confirmEdit()">Save</button>
                <button class="btn cancel-btn" onclick="closeEditModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- DELETE USER MODAL -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <h3 id="deleteUserName"></h3>

            <p id="deleteMessage"></p>

            <div class="modal-actions">
                <button class="btn danger" onclick="confirmDelete()">Yes, Delete</button>
                <button class="btn" onclick="closeDeleteModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div class="pagination">
        <button onclick="previousPage()">Previous</button>
        <button onclick="nextPage()">Next</button>
    </div>

    <p id="error"></p>

</div>

<script src="js/api.js"></script>
<script src="js/admin-users.js"></script>
</body>

</html>
