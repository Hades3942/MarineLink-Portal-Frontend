<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Buyer Dashboard - MarineLink Portal</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

<div class="sidebar">
    <h2>MarineLink Portal</h2>

    <ul>
        <li onclick="goDashboard()">Dashboard</li>
        <li onclick="navigate('buyer_listings')">Listings</li>
        <li onclick="navigate('buyer_orders')">My Orders</li>
        <li onclick="logout()">Logout</li>
    </ul>
</div>

<div class="main">
    <div class="dashboard-header">
        <h2>Welcome, <span id="welcomeBuyer"></span></h2>
    </div>

    <div class="stats-grid">
        <div class="card">
            <h3>Total Orders</h3>
            <span id="totalOrders">0</span>
        </div>

        <div class="card">
            <h3>Completed Orders</h3>
            <span id="completedOrders">0</span>
        </div>

        <div class="card">
            <h3>Pending Orders</h3>
            <span id="pendingOrders">0</span>
        </div>

        <div class="card">
            <h3>Total Spent</h3>
            <span id="totalSpent">0 TZS</span>
        </div>
    </div>

    <h2>Recent Orders</h2>

    <table id="buyerOrdersTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Listing</th>
                <th>Fisher</th>
                <th>Total Price (TZS)</th>
                <th>Status</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <p id="error"></p>
</div>

<script src="js/api.js"></script>
<script src="js/buyer-dashboard.js"></script>
</body>
</html>
