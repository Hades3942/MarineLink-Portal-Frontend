<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - MarineLink Portal</title>
    <link rel="stylesheet" href="css/login.css">
</head>

<body>

<div class="container">
    <div class="login-box">
        <h2>Create Account</h2>

        <input id="reg_zanzibarId" type="text" placeholder="Zanzibar ID">
        <input id="reg_fullName" type="text" placeholder="Full Name">
        <input id="reg_email" type="text" placeholder="Email">
        <input id="reg_username" type="text" placeholder="Username">
        <input id="reg_password" type="password" placeholder="Password">
        <select id="reg_role">
            <option value="FISHER">Fisher</option>
            <option value="BUYER">Buyer</option>
            <option value="REGULATOR">Regulator</option>
            <option value="ADMIN">Admin</option>
        </select>

        <button onclick="register()">Register</button>

        <p class="register-link">
            Already have an account? <a href="index.html">Login here</a>
        </p>

        <p id="error"></p>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
